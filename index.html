<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto site - recohecimento de imagens</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .main-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        #webcam-container {
            border-radius: 10px;
            overflow: hidden;
            display: inline-block;
            background: #000;
            line-height: 0;
        }
        canvas {
            max-width: 100%;
            height: auto !important;
        }
        .prediction-label {
            font-weight: 600;
            margin-bottom: 5px;
            text-transform: capitalize;
        }
        .progress {
            height: 25px;
            border-radius: 12px;
            background-color: #e9ecef;
            margin-bottom: 15px;
        }
        .btn-start {
            padding: 12px 30px;
            font-weight: bold;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(13, 110, 253, 0.4);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 text-center">
            
            <div class="card main-card p-4">
                <h2 class="mb-4 text-primary">Reconhecimento de Imagem</h2>
                <p class="text-muted mb-4">Clique no botão abaixo para ativar a câmera e iniciar a predição em tempo real.</p>
                
                <button class="btn btn-primary btn-lg btn-start mb-4" type="button" onclick="init()">
                    ATIVAR CÂMERA
                </button>

                <div id="webcam-container" class="mb-4 shadow-sm"></div>

                <div id="label-container" class="text-start px-3">
                    </div>
            </div>
            
            <p class="mt-4 text-secondary small">Desenvolvido com Teachable Machine & TensorFlow.js</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>

<script type="text/javascript">
    const URL = "https://teachablemachine.withgoogle.com/models/VR_Tjt00P/";
    let model, webcam, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const flip = true;
        webcam = new tmImage.Webcam(350, 350, flip); 
        await webcam.setup();
        await webcam.play();
        window.requestAnimationFrame(loop);

        document.getElementById("webcam-container").appendChild(webcam.canvas);
        labelContainer = document.getElementById("label-container");
        
        // Limpa o container antes de adicionar as barras
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
            const wrapper = document.createElement("div");
            wrapper.className = "mb-3";
            wrapper.innerHTML = `
                <div class="prediction-label d-flex justify-content-between">
                    <span class="class-name">...</span>
                    <span class="percent-value text-primary">0%</span>
                </div>
                <div class="progress">
                    <div class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%"></div>
                </div>
            `;
            labelContainer.appendChild(wrapper);
        }
    }

    async function loop() {
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const prediction = await model.predict(webcam.canvas);
        for (let i = 0; i < maxPredictions; i++) {
            const classNode = labelContainer.childNodes[i];
            const name = prediction[i].className;
            const probability = (prediction[i].probability * 100).toFixed(0);
            
            // Atualiza o texto e a barra
            classNode.querySelector(".class-name").innerText = name;
            classNode.querySelector(".percent-value").innerText = probability + "%";
            
            const progressBar = classNode.querySelector(".progress-bar");
            progressBar.style.width = probability + "%";
            
            // Muda a cor da barra baseado na confiança
            if (probability > 80) {
                progressBar.className = "progress-bar bg-success progress-bar-striped progress-bar-animated";
            } else if (probability > 40) {
                progressBar.className = "progress-bar bg-primary progress-bar-striped progress-bar-animated";
            } else {
                progressBar.className = "progress-bar bg-secondary progress-bar-striped progress-bar-animated";
            }
        }
    }
</script>

</body>
</html>
